name: Fuel Tracker
version: "0.4.4"
slug: fuel_tracker
description: >-
  Dziennik tankowań i wydatków samochodu w stylu Fuelio.
  Spalanie L/100km liczone segmentami między pełnymi bakami, import z Fuelio CSV
  i API Drivvo, sensory MQTT discovery, web UI przez ingress.
url: "https://github.com/miczu71/fuel_tracker"
arch:
  - aarch64
  - amd64
  - armv7
init: false
homeassistant_api: true
services:
  - mqtt:need
map:
  - share:rw
ingress: true
ingress_port: 8098
panel_icon: mdi:gas-station
options:
  vehicle_name: "Skoda Superb"
  tank_capacity_l: 66.0
  default_fuel_type: "PB95"
  monthly_fuel_budget: 984.0
  odometer_entity: "sensor.skoda_superb_mileage"
  fuel_level_entity: "sensor.skoda_superb_fuel_level"
  location_entity: "device_tracker.op12"
  price_region: "dolnośląskie"
  odo_budget_entity: "sensor.odo_vs_budget"
  lease_km_limit: 90000
  drivvo_email: ""
  drivvo_password: ""
  drivvo_vehicle_id: 0
  notify_service: "notify/family"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  log_level: "info"
  backup_share: "/share/fuel_tracker"
  timezone: "Europe/Warsaw"
schema:
  vehicle_name: str
  tank_capacity_l: float
  default_fuel_type: str
  monthly_fuel_budget: float
  odometer_entity: str
  fuel_level_entity: str
  location_entity: str?
  price_region: str?
  odo_budget_entity: str?
  lease_km_limit: int?
  drivvo_email: str
  drivvo_password: password
  drivvo_vehicle_id: int
  notify_service: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  log_level: "list(debug|info|warning|error)?"
  backup_share: str
  timezone: str?

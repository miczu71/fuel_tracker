<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Fuel Tracker{% endblock %} — {{ vehicle }}</title>
<link rel="stylesheet" href="{{ base }}/static/app.css?v={{ version }}">
<link rel="manifest" href="{{ base }}/manifest.webmanifest">
<meta name="theme-color" content="#2a78d6">
<link rel="apple-touch-icon" href="{{ base }}/static/icons/apple-touch-icon.png?v={{ version }}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fuel Tracker">
</head>
<body data-vehicle-id="{{ vehicle_id }}" data-base="{{ base }}">
<nav class="nav">
  <span class="nav-brand">⛽ {{ vehicle }}</span>
  <select id="vehicle-switcher" class="nav-vehicle-switcher"></select>
  <div class="nav-links">
    <a href="{{ base }}/?vehicle_id={{ vehicle_id }}" {% if active == 'dashboard' %}class="active"{% endif %}>Pulpit</a>
    <a href="{{ base }}/fillups?vehicle_id={{ vehicle_id }}" {% if active == 'fillups' %}class="active"{% endif %}>Tankowania</a>
    <a href="{{ base }}/map?vehicle_id={{ vehicle_id }}" {% if active == 'map' %}class="active"{% endif %}>Mapa</a>
    <a href="{{ base }}/statistics?vehicle_id={{ vehicle_id }}" {% if active == 'statistics' %}class="active"{% endif %}>Statystyki</a>
    <a href="{{ base }}/compare?vehicle_id={{ vehicle_id }}" {% if active == 'compare' %}class="active"{% endif %}>Porównanie</a>
    <a href="{{ base }}/expenses?vehicle_id={{ vehicle_id }}" {% if active == 'expenses' %}class="active"{% endif %}>Wydatki</a>
    <a href="{{ base }}/settings?vehicle_id={{ vehicle_id }}" {% if active == 'settings' %}class="active"{% endif %}>Ustawienia</a>
  </div>
  <span class="nav-version">v{{ version }}</span>
</nav>
<main class="main">
{% block content %}{% endblock %}
</main>
<script src="{{ base }}/static/chart.umd.min.js?v={{ version }}"></script>
<script src="{{ base }}/static/app.js?v={{ version }}"></script>
<script>FT.initVehicleSwitcher();</script>
{% block scripts %}{% endblock %}
</body>
</html>

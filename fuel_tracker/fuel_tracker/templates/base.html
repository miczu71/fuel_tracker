<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Fuel Tracker{% endblock %} — {{ vehicle }}</title>
<link rel="stylesheet" href="{{ base }}/static/app.css?v={{ version }}">
</head>
<body>
<nav class="nav">
  <span class="nav-brand">⛽ {{ vehicle }}</span>
  <div class="nav-links">
    <a href="{{ base }}/" {% if active == 'dashboard' %}class="active"{% endif %}>Pulpit</a>
    <a href="{{ base }}/fillups" {% if active == 'fillups' %}class="active"{% endif %}>Tankowania</a>
    <a href="{{ base }}/map" {% if active == 'map' %}class="active"{% endif %}>Mapa</a>
    <a href="{{ base }}/statistics" {% if active == 'statistics' %}class="active"{% endif %}>Statystyki</a>
    <a href="{{ base }}/expenses" {% if active == 'expenses' %}class="active"{% endif %}>Wydatki</a>
    <a href="{{ base }}/settings" {% if active == 'settings' %}class="active"{% endif %}>Ustawienia</a>
  </div>
  <span class="nav-version">v{{ version }}</span>
</nav>
<main class="main">
{% block content %}{% endblock %}
</main>
<script src="{{ base }}/static/chart.umd.min.js?v={{ version }}"></script>
<script src="{{ base }}/static/app.js?v={{ version }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>

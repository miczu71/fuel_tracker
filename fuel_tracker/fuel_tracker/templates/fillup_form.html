{% extends "base.html" %}
{% set active = 'fillups' %}
{% block title %}Tankowanie{% endblock %}
{% block content %}
<div class="page-head"><h1 id="form-title">Nowe tankowanie</h1></div>
<form class="card form" id="fillup-form" data-edit-id="{{ edit_id }}">
  <div class="scan-row">
    <label class="btn" for="receipt-input">📷 Zeskanuj paragon</label>
    <input type="file" id="receipt-input" accept="image/*"
           capture="environment" class="visually-hidden">
    <span class="muted" id="scan-status"></span>
  </div>
  <label>Data i godzina
    <input type="datetime-local" name="date" required>
  </label>
  <label>Przebieg (km) <span class="muted" id="odo-hint"></span>
    <input type="number" name="odometer" inputmode="numeric" min="0" required>
  </label>
  <div class="row3">
    <label>Litry
      <input type="number" name="volume_l" inputmode="decimal" step="0.01" min="0">
    </label>
    <label>Cena/L <span id="cur-price">(PLN)</span>
      <input type="number" name="price_per_l" inputmode="decimal" step="0.01" min="0">
    </label>
    <label>Kwota <span id="cur-total">(PLN)</span>
      <input type="number" name="total_cost" inputmode="decimal" step="0.01" min="0">
    </label>
  </div>
  <p class="muted">Wypełnij dowolne 2 z 3 pól — trzecie wyliczy się samo.</p>
  <div class="row3">
    <label>Waluta
      <select name="currency">
        {% for c in currencies %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
    </label>
    <label id="rate-label" hidden>Kurs (PLN) <span class="muted" id="rate-hint"></span>
      <input type="number" name="exchange_rate" inputmode="decimal" step="0.0001" min="0">
    </label>
  </div>
  <label class="check">
    <input type="checkbox" name="full_tank" checked> Pełny bak
  </label>
  <label class="check">
    <input type="checkbox" name="missed_previous"> Pominięto poprzednie tankowanie
  </label>
  <label class="check">
    <input type="checkbox" name="paid_by"> Zapłacone przeze mnie (nie karta ORLEN Flota)
  </label>
  <label>Stacja <span class="muted" id="gps-hint"></span>
    <input type="text" name="station" list="stations">
    <datalist id="stations"></datalist>
  </label>
  <input type="hidden" name="latitude">
  <input type="hidden" name="longitude">
  <label>Notatki
    <input type="text" name="notes">
  </label>
  <label class="check" id="receipt-extras" hidden>
    <input type="checkbox" id="extras-check" checked>
    <span id="extras-label"></span>
  </label>
  <div class="form-actions">
    <button type="submit" class="btn primary big">Zapisz</button>
    <a class="btn" href="{{ base }}/fillups">Anuluj</a>
  </div>
  <div class="error" id="form-error" hidden></div>
</form>
{% endblock %}
{% block scripts %}<script>FT.initFillupForm("{{ base }}");</script>{% endblock %}
